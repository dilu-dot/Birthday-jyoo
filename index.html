<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Jyoti ❤️</title>

<style>
body{
  margin:0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  overflow-x:hidden;
  text-align:center;
}

/* Card */
.card{
  background:white;
  width:90%;
  max-width:400px;
  margin:40px auto;
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
  font-family:cursive;
  color:#e91e63;
}

button{
  background:#ff4081;
  color:white;
  border:none;
  padding:12px 25px;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
  margin-top:15px;
}

img{
  width:150px;
  border-radius:50%;
  margin:15px;
}

/* Floating hearts */
.heart{
  position:fixed;
  bottom:-10px;
  font-size:20px;
  animation: float 6s linear infinite;
}
@keyframes float{
  to{
    transform:translateY(-110vh);
    opacity:0;
  }
}

/* Cute Cake */
.cake{
  position:relative;
  width:200px;
  height:140px;
  margin:20px auto;
}

.base{
  width:200px;
  height:100px;
  background:#fff;
  border-radius:15px;
  position:absolute;
  bottom:0;
  box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.frosting{
  width:200px;
  height:40px;
  background:#6a5acd;
  border-radius:15px 15px 0 0;
  position:absolute;
  top:0;
}

.eye{
  width:15px;
  height:15px;
  background:black;
  border-radius:50%;
  position:absolute;
  top:60px;
}
.eye.left{ left:60px; }
.eye.right{ right:60px; }

.mouth{
  width:30px;
  height:15px;
  background:black;
  border-radius:0 0 30px 30px;
  position:absolute;
  top:80px;
  left:85px;
}

/* Candle */
.candle{
  width:10px;
  height:40px;
  background:white;
  position:absolute;
  top:-40px;
}

.c1{ left:50px;}
.c2{ left:95px;}
.c3{ left:140px;}

.flame{
  width:10px;
  height:15px;
  background:orange;
  border-radius:50%;
  position:absolute;
  top:-15px;
  animation:flicker 0.5s infinite alternate;
}

@keyframes flicker{
  from{ transform:scale(1);}
  to{ transform:scale(1.2);}
}

.hidden{ display:none; }

</style>
</head>

<body>

<div class="card">
<h1>Happy Birthday, Beautiful ❤️</h1>
<p>Today is all about celebrating you ✨</p>
<button onclick="start()">Start the Celebration 🎉</button>

<div id="content" class="hidden">

<img src="jyoti.jpg">

<h2>Only For Jyoti 💖</h2>

<div id="countdown"></div>

<div class="cake" onclick="cutCake()">
  <div class="frosting"></div>
  <div class="base"></div>
  <div class="eye left"></div>
  <div class="eye right"></div>
  <div class="mouth"></div>

  <div class="candle c1"><div class="flame"></div></div>
  <div class="candle c2"><div class="flame"></div></div>
  <div class="candle c3"><div class="flame"></div></div>
</div>

<p id="msg" class="hidden">
You are my sunshine ☀️<br>
Stay blessed forever 💕
</p>

</div>
</div>

<audio id="music" src="song.mp3"></audio>

<script>
function start(){
  document.getElementById("content").classList.remove("hidden");
  document.getElementById("music").play();
}

/* Countdown */
var birthday = new Date("Nov 15, 2026 00:00:00").getTime();
setInterval(function(){
  var now = new Date().getTime();
  var distance = birthday - now;
  var days = Math.floor(distance/(1000*60*60*24));
  document.getElementById("countdown").innerHTML =
  "🎂 "+days+" Days Left";
},1000);

/* Cake Click */
function cutCake(){
  document.getElementById("msg").classList.remove("hidden");
  for(let i=0;i<20;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💖";
    heart.style.left=Math.random()*100+"vw";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),6000);
  }
}
</script>

</body>
</html>
