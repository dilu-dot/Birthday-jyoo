<!DOCTYPE html>
<html>
<head>
<title>Special For Jyoti ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  text-align:center;
  background:black;
  color:white;
  overflow:hidden;
}

/* RED BANNER */
.banner{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:red;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:40px;
  cursor:pointer;
  transition:1s;
  z-index:10;
}

.banner.open{
  height:0%;
  font-size:0;
}

/* MAIN CONTENT */
.content{
  display:none;
  padding-top:80px;
}

h1{
  font-size:40px;
}

.countdown{
  font-size:25px;
  margin:20px;
}

.cake{
  font-size:100px;
  cursor:pointer;
  margin-top:30px;
  transition:0.5s;
}

.message{
  display:none;
  font-size:25px;
  margin-top:20px;
  color:pink;
}

/* CONFETTI */
.confetti{
  position:fixed;
  width:10px;
  height:10px;
  background:yellow;
  top:-10px;
  animation:fall 3s linear infinite;
}

@keyframes fall{
  to{ transform:translateY(100vh) rotate(360deg);}
}
</style>
</head>

<body>

<div class="banner" onclick="openSite()">
🎀 Tap To Open 🎀
</div>

<div class="content" id="mainContent">

<h1>Welcome Guyz 🎉</h1>
<h2>Only For Jyoti ❤️</h2>

<div class="countdown" id="countdown"></div>

<div class="cake" onclick="cutCake()">🎂</div>

<div class="message" id="msg">
Happy Birthday Jyoti 💖🎉<br>
May your smile always shine ✨
</div>

</div>

<script>
function openSite(){
  document.querySelector(".banner").classList.add("open");
  setTimeout(()=>{
    document.querySelector(".banner").style.display="none";
    document.getElementById("mainContent").style.display="block";
    document.body.style.overflow="auto";
  },1000);
}

/* COUNTDOWN */
var birthday = new Date("Nov 15, 2026 00:00:00").getTime();

setInterval(function(){
  var now = new Date().getTime();
  var distance = birthday - now;

  var days = Math.floor(distance/(1000*60*60*24));
  var hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
  var minutes = Math.floor((distance%(1000*60*60))/(1000*60));
  var seconds = Math.floor((distance%(1000*60))/1000);

  document.getElementById("countdown").innerHTML =
  "🎂 Birthday Countdown: "+days+"d "+hours+"h "
  +minutes+"m "+seconds+"s ";

},1000);

/* CAKE CUT */
function cutCake(){
  document.getElementById("msg").style.display="block";

  for(let i=0;i<50;i++){
    let confetti = document.createElement("div");
    confetti.classList.add("confetti");
    confetti.style.left = Math.random()*100+"vw";
    confetti.style.background = 
      "hsl(" + Math.random()*360 + ",100%,50%)";
    document.body.appendChild(confetti);

    setTimeout(()=>confetti.remove(),3000);
  }
}
</script>

</body>
</html>
