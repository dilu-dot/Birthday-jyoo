<!DOCTYPE html>
<html>
<head>
<title>For Jyoti ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:black;
  color:white;
  text-align:center;
  overflow:hidden;
}

/* Curtain */
.curtain{
  position:fixed;
  width:50%;
  height:100vh;
  background:red;
  top:0;
  transition:1.5s;
  z-index:10;
}
.left{ left:0; }
.right{ right:0; }

.open-left{ transform:translateX(-100%); }
.open-right{ transform:translateX(100%); }

.enter{
  position:fixed;
  top:45%;
  width:100%;
  font-size:28px;
  cursor:pointer;
  z-index:20;
}

.content{
  display:none;
  padding-top:80px;
}

/* Typing effect */
.typing{
  border-right:3px solid pink;
  white-space:nowrap;
  overflow:hidden;
  width:0;
  animation: typing 3s steps(20,end) forwards;
}

@keyframes typing{
  from{ width:0 }
  to{ width:220px }
}

/* Cake */
.cake{
  font-size:110px;
  margin-top:20px;
  cursor:pointer;
  transition:0.5s;
}

.flame{
  font-size:30px;
  animation: flicker 0.5s infinite alternate;
}

@keyframes flicker{
  from{ opacity:1; }
  to{ opacity:0.5; }
}

#msg{
  display:none;
  font-size:24px;
  color:pink;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="curtain left"></div>
<div class="curtain right"></div>

<div class="enter" onclick="openCurtain()">🎀 Tap To Enter 🎀</div>

<div class="content" id="main">

<h1>Welcome Guyz 🎉</h1>
<h2 class="typing">Only For Jyoti ❤️</h2>

<div id="countdown"></div>

<div>
<div class="flame" id="flame">🕯️🕯️🕯️</div>
<div class="cake" onclick="cutCake()">🎂</div>
</div>

<div id="msg">
Happy Birthday Jyoti 💖🎉<br>
You are Special ✨
</div>

</div>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
function openCurtain(){
  document.querySelector(".left").classList.add("open-left");
  document.querySelector(".right").classList.add("open-right");
  document.querySelector(".enter").style.display="none";
  setTimeout(()=>{
    document.getElementById("main").style.display="block";
    document.body.style.overflow="auto";
    document.getElementById("music").play();
  },1500);
}

/* Countdown */
var birthday = new Date("Nov 15, 2026 00:00:00").getTime();

setInterval(function(){
  var now = new Date().getTime();
  var distance = birthday - now;

  var days = Math.floor(distance/(1000*60*60*24));
  var hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
  var minutes = Math.floor((distance%(1000*60*60))/(1000*60));
  var seconds = Math.floor((distance%(1000*60))/1000);

  document.getElementById("countdown").innerHTML =
  "🎂 Birthday Countdown: "+days+"d "+hours+"h "+minutes+"m "+seconds+"s";
},1000);

/* Cake Cut */
function cutCake(){
  document.getElementById("msg").style.display="block";
  document.getElementById("flame").style.display="none";
  alert("🎊 Cake Cut Successfully! 🎊");
}
</script>

</body>
</html>
